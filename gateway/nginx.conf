server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = /mfe/seller-auth/mf-manifest.json {
    proxy_pass http://grab-seller-auth/mf-manifest.json;
    add_header Cache-Control "no-store" always;
  }

  location /mfe/seller-auth/assets/ {
    proxy_pass http://grab-seller-auth/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /mfe/seller-auth/ {
    proxy_pass http://grab-seller-auth/;
    add_header Cache-Control "no-cache" always;
  }

  location = /mfe/seller-account/mf-manifest.json {
    proxy_pass http://grab-seller-account/mf-manifest.json;
    add_header Cache-Control "no-store" always;
  }

  location /mfe/seller-account/assets/ {
    proxy_pass http://grab-seller-account/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /mfe/seller-account/ {
    proxy_pass http://grab-seller-account/;
    add_header Cache-Control "no-cache" always;
  }

  location = /mfe/seller-product/mf-manifest.json {
    proxy_pass http://grab-seller-product/mf-manifest.json;
    add_header Cache-Control "no-store" always;
  }

  location /mfe/seller-product/assets/ {
    proxy_pass http://grab-seller-product/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /mfe/seller-product/ {
    proxy_pass http://grab-seller-product/;
    add_header Cache-Control "no-cache" always;
  }

  location /api/ {
    proxy_pass http://${API_UPSTREAM}/api/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Platform "SELLER_PORTAL";
  }

  location = /runtime-config.json {
    add_header Cache-Control "no-store" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache" always;
  }
}
