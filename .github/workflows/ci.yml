name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  composition:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { path: seller }
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/grab-seller-product-mfe
          path: seller-product-mfe
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/grab-seller-inventory-mfe
          path: seller-inventory-mfe
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@grab'
          cache: npm
          cache-dependency-path: |
            seller/package-lock.json
            seller-product-mfe/package-lock.json
            seller-inventory-mfe/package-lock.json
      - run: npm ci && npm test && npm run build
        working-directory: seller-product-mfe
      - run: npm ci && npm test && npm run build
        working-directory: seller-inventory-mfe
      - run: npm ci && npm test && npm run build
        working-directory: seller
      - run: npx playwright install --with-deps chromium
        working-directory: seller
      - run: npm run test:e2e
        working-directory: seller
